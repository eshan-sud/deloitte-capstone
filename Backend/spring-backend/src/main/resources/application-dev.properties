# Local dev fallback profile to avoid blocking startup on MySQL credentials.
# Any SPRING_DATASOURCE_* environment variable still takes precedence.
spring.datasource.url=jdbc:h2:mem:event_management;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
