openapi: 3.0.3
info:
  title: EventNest Node Notifications API
  version: 1.0.0
servers:
  - url: http://localhost:4000/api
paths:
  /health:
    get:
      summary: Service health
      responses:
        "200":
          description: OK
  /v1/notifications/test:
    post:
      summary: Test notification endpoint
      responses:
        "202":
          description: Accepted
  /v1/notifications/send:
    post:
      summary: Send notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Accepted
  /v1/notifications/event-order-created:
    post:
      summary: Order-created notification trigger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Accepted
  /v1/notifications/reminder:
    post:
      summary: Reminder trigger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Accepted
  /v1/notifications/my:
    get:
      summary: Get notifications for a user
      parameters:
        - in: query
          name: recipientUserId
          schema:
            type: string
        - in: query
          name: recipient
          schema:
            type: string
      responses:
        "200":
          description: OK
  /v1/notifications/{id}/read:
    patch:
      summary: Mark one notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
  /v1/notifications/read-all:
    patch:
      summary: Mark all notifications as read
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
  /v1/notifications/logs:
    get:
      summary: List notification logs
      responses:
        "200":
          description: OK
