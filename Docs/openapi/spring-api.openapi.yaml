openapi: 3.0.3
info:
  title: EventNest Spring API
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
paths:
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
  /auth/me:
    get:
      summary: Current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /events:
    get:
      summary: List/search events
      parameters:
        - in: query
          name: query
          schema:
            type: string
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
      responses:
        "200":
          description: OK
    post:
      summary: Create event
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
      responses:
        "201":
          description: Created
  /events/{id}:
    get:
      summary: Event detail
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
    put:
      summary: Update event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
      responses:
        "200":
          description: OK
    delete:
      summary: Delete event
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
  /venues:
    get:
      summary: List venues
      responses:
        "200":
          description: OK
  /venues/availability:
    get:
      summary: Venue availability check
      parameters:
        - in: query
          name: venueId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: startAt
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: endAt
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK
  /orders:
    post:
      summary: Place order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "201":
          description: Created
  /orders/my:
    get:
      summary: Current user orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    EventRequest:
      type: object
      required:
        [
          title,
          category,
          description,
          venueId,
          startAt,
          endAt,
          capacity,
          price,
          status,
        ]
      properties:
        title:
          type: string
        category:
          type: string
        description:
          type: string
        venueId:
          type: integer
          format: int64
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        capacity:
          type: integer
        price:
          type: number
          format: double
        status:
          type: string
    PlaceOrderRequest:
      type: object
      required: [eventId, quantity]
      properties:
        eventId:
          type: integer
          format: int64
        quantity:
          type: integer
