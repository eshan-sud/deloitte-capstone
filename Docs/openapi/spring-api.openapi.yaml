openapi: 3.0.3
info:
  title: EventNest Spring API
  version: 1.0.0
  description: |
    Spring Boot service for auth, user management, venues, events, and ticket orders.
    All routes are served under /api.
servers:
  - url: http://localhost:8080/api
tags:
  - name: Auth
  - name: Users
  - name: Venues
  - name: Events
  - name: Orders
paths:
  /auth/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/forgot-password:
    post:
      tags: [Auth]
      operationId: forgotPassword
      summary: Create reset token (demo mode)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Forgot-password request accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/reset-password:
    post:
      tags: [Auth]
      operationId: resetPassword
      summary: Reset password by token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetPasswordApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/health:
    get:
      tags: [Auth]
      operationId: authHealth
      summary: Auth service health
      responses:
        "200":
          description: Auth service healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthHealthApiResponse"

  /auth/users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListApiResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/users/{id}/status:
    patch:
      tags: [Users]
      operationId: updateUserStatus
      summary: Update user active flag (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusRequest"
      responses:
        "200":
          description: User status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /auth/users/{id}/role:
    patch:
      tags: [Users]
      operationId: updateUserRole
      summary: Update user role (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRoleRequest"
      responses:
        "200":
          description: User role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /users/me:
    put:
      tags: [Users]
      operationId: updateMyProfile
      summary: Update current profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /users/{id}:
    get:
      tags: [Users]
      operationId: getUserById
      summary: Get user by ID (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: User fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserApiResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /venues:
    get:
      tags: [Venues]
      operationId: listVenues
      summary: List venues
      responses:
        "200":
          description: Venues fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenueListApiResponse"

  /venues/availability:
    get:
      tags: [Venues]
      operationId: checkVenueAvailability
      summary: Check venue slot availability
      parameters:
        - in: query
          name: venueId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: startAt
          required: true
          description: ISO-8601 instant (UTC), e.g. 2030-01-15T10:00:00Z
          schema:
            type: string
            format: date-time
        - in: query
          name: endAt
          required: true
          description: ISO-8601 instant (UTC), e.g. 2030-01-15T13:00:00Z
          schema:
            type: string
            format: date-time
        - in: query
          name: excludeEventId
          required: false
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Venue availability checked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenueAvailabilityApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /events:
    get:
      tags: [Events]
      operationId: listEvents
      summary: List and search events
      description: includeDrafts is only effective for ADMIN/ORGANIZER users.
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
        - in: query
          name: category
          required: false
          schema:
            type: string
        - in: query
          name: status
          required: false
          schema:
            $ref: "#/components/schemas/EventStatus"
        - in: query
          name: includeDrafts
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Events fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListApiResponse"
    post:
      tags: [Events]
      operationId: createEvent
      summary: Create event (admin or organizer)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
      responses:
        "201":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  /events/{id}:
    get:
      tags: [Events]
      operationId: getEventById
      summary: Get event details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Event fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventApiResponse"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      tags: [Events]
      operationId: updateEvent
      summary: Update event (admin or owning organizer)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    delete:
      tags: [Events]
      operationId: deleteEvent
      summary: Delete event (admin or owning organizer)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Event deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyApiResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /orders:
    post:
      tags: [Orders]
      operationId: placeOrder
      summary: Place ticket order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceOrderRequest"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /orders/my:
    get:
      tags: [Orders]
      operationId: getMyOrders
      summary: Get current user orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderListApiResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  /orders/{id}:
    get:
      tags: [Orders]
      operationId: getOrderById
      summary: Get order by ID (owner/admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Order fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderApiResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  /orders/{id}/cancel:
    patch:
      tags: [Orders]
      operationId: cancelOrder
      summary: Cancel order (owner/admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderApiResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequestError:
      description: Bad request or validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    UnauthorizedError:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    ForbiddenError:
      description: Authenticated but not authorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    NotFoundError:
      description: Requested resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"
    InternalServerError:
      description: Unhandled server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorApiResponse"

  schemas:
    ApiResponseMeta:
      type: object
      required: [success, message, timestamp]
      properties:
        success:
          type: boolean
        message:
          type: string
        timestamp:
          type: string
          format: date-time
        errors:
          nullable: true
          oneOf:
            - type: object
              additionalProperties: true
            - type: string

    ErrorApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          properties:
            success:
              type: boolean
              example: false
            data:
              nullable: true
              type: object
              additionalProperties: true
            errors:
              nullable: true
              oneOf:
                - type: object
                  additionalProperties:
                    type: string
                - type: string

    AuthApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/AuthResponse"

    ForgotPasswordApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/ForgotPasswordResponse"

    ResetPasswordApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/ResetPasswordResult"

    UserApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/UserResponse"

    UserListApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/UserResponse"

    AuthHealthApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/AuthHealthData"

    VenueListApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/VenueResponse"

    VenueAvailabilityApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/VenueAvailabilityResponse"

    EventApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/EventResponse"

    EventListApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/EventResponse"

    OrderApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/OrderResponse"

    OrderListApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/OrderResponse"

    EmptyApiResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponseMeta"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/EmptyObject"

    RegisterRequest:
      type: object
      required: [firstName, lastName, email, password]
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, password, confirmPassword]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 8
          description: Must include uppercase, lowercase, and number.
        confirmPassword:
          type: string

    UpdateProfileRequest:
      type: object
      required: [firstName, lastName, email]
      properties:
        firstName:
          type: string
          minLength: 2
          maxLength: 50
        lastName:
          type: string
          minLength: 2
          maxLength: 50
        email:
          type: string
          format: email

    UpdateUserStatusRequest:
      type: object
      required: [isActive]
      properties:
        isActive:
          type: boolean

    UpdateUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: "#/components/schemas/Role"

    EventRequest:
      type: object
      required:
        - title
        - category
        - description
        - venueId
        - startAt
        - endAt
        - capacity
        - price
        - status
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 140
        category:
          type: string
          minLength: 2
          maxLength: 80
        description:
          type: string
          minLength: 10
          maxLength: 4000
        venueId:
          type: integer
          format: int64
        startAt:
          type: string
          format: date-time
          description: LocalDateTime serialized in ISO format.
        endAt:
          type: string
          format: date-time
          description: LocalDateTime serialized in ISO format.
        capacity:
          type: integer
          minimum: 1
        price:
          type: number
          format: double
          minimum: 0
        status:
          $ref: "#/components/schemas/EventStatus"

    PlaceOrderRequest:
      type: object
      required: [eventId, quantity]
      properties:
        eventId:
          type: integer
          format: int64
        quantity:
          type: integer
          minimum: 1

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserResponse"
        message:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/Role"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ForgotPasswordResponse:
      type: object
      properties:
        demoMode:
          type: boolean
        resetTokenIssued:
          type: boolean
        resetToken:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true

    ResetPasswordResult:
      type: object
      required: [reset]
      properties:
        reset:
          type: boolean

    AuthHealthData:
      type: object
      properties:
        service:
          type: string
        timestamp:
          type: string
          format: date-time

    VenueResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        capacity:
          type: integer
        pricePerHour:
          type: number
          format: double

    VenueAvailabilityResponse:
      type: object
      properties:
        venueId:
          type: integer
          format: int64
        venueName:
          type: string
        requestedStartAt:
          type: string
          format: date-time
        requestedEndAt:
          type: string
          format: date-time
        available:
          type: boolean
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/VenueConflictSummary"

    VenueConflictSummary:
      type: object
      properties:
        eventId:
          type: integer
          format: int64
        title:
          type: string
        status:
          type: string
        organizerId:
          type: integer
          format: int64
        organizerName:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time

    EventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        category:
          type: string
        description:
          type: string
        venueId:
          type: integer
          format: int64
        venueName:
          type: string
        organizerId:
          type: integer
          format: int64
        organizerName:
          type: string
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        capacity:
          type: integer
        seatsBooked:
          type: integer
        seatsLeft:
          type: integer
        price:
          type: number
          format: double
        status:
          $ref: "#/components/schemas/EventStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
