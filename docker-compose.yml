services:
  mysql:
    image: mysql:8.4
    container_name: event-management-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-1234}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-event_management}"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  mongo:
    image: mongo:7
    container_name: event-management-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  spring-backend:
    build:
      context: ./Backend/spring-backend
    container_name: event-management-spring
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-dev}"
      SPRING_DATASOURCE_URL: "${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/event_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}"
      SPRING_DATASOURCE_USERNAME: "${SPRING_DATASOURCE_USERNAME:-root}"
      SPRING_DATASOURCE_PASSWORD: "${SPRING_DATASOURCE_PASSWORD:-1234}"
      SPRING_JPA_HIBERNATE_DIALECT: "${SPRING_JPA_HIBERNATE_DIALECT:-org.hibernate.dialect.MySQLDialect}"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/auth/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  dotnet-backend:
    build:
      context: ./Backend/dotnet-backend
    container_name: event-management-dotnet
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ASPNETCORE_URLS: "${ASPNETCORE_URLS:-http://+:8080}"
      ConnectionStrings__DefaultConnection: "${ASPNET_CONNECTION_STRING:-Server=mysql;Port=3306;Database=event_management;Uid=root;Pwd=1234;}"
      Cors__AllowedOrigins__0: "${CORS_ALLOWED_ORIGIN_0:-http://localhost:5173}"
      Cors__AllowedOrigins__1: "${CORS_ALLOWED_ORIGIN_1:-http://localhost:3000}"
    ports:
      - "5107:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "curl", "--fail", "http://localhost:8080/api/reports/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  node-backend:
    build:
      context: ./Backend/node-backend
    container_name: event-management-node
    restart: unless-stopped
    env_file:
      - ./Backend/node-backend/.env
    environment:
      # Override DB host for container-to-container networking in compose.
      DB_URI: "${NODE_DB_URI:-mongodb://mongo:27017/event_notifications}"
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:4000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./Frontend
      args:
        VITE_SPRING_API_URL: "${VITE_SPRING_API_URL:-http://localhost:8080/api}"
        VITE_ASPNET_API_URL: "${VITE_ASPNET_API_URL:-http://localhost:5107/api}"
        VITE_NODE_API_URL: "${VITE_NODE_API_URL:-http://localhost:4000/api}"
    container_name: event-management-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      spring-backend:
        condition: service_healthy
      dotnet-backend:
        condition: service_healthy
      node-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mysql_data:
  mongo_data:
